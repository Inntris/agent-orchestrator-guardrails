protected_paths:
  - "src/auth/**"
  - "src/middleware.ts"
  - "supabase/migrations/**"
  - ".github/workflows/**"
  - "infra/**"
  - "**/.env*"

rules:
  - name: "Block AI changes to protected production paths"
    when:
      actor_type: "ai_agent"
      branch_target: "main"
      paths_match: "protected_paths"
    verdict: "block"
    reason: "AI-generated PR touched protected production-sensitive files"

  - name: "Allow low-risk documentation and UI changes"
    when:
      actor_type: "ai_agent"
      paths_match:
        - "docs/**"
        - "src/components/**"
    verdict: "allow"
    reason: "AI-generated PR only touched approved low-risk paths"
